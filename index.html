<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Marketing Mastery</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h2>DM Mastery</h2>
            </div>
            
            <div class="nav-title">STUDY MODULES</div>
            <nav id="nav-menu">
                <!-- Navigation items injected via JS -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area">
            
            <!-- Topbar -->
            <header class="topbar">
                <div class="mobile-menu-toggle" id="mobile-toggle">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <div class="topbar-title">
                    <h1 id="current-section-title">Loading...</h1>
                </div>
                <div class="topbar-actions">
                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                        <i class="fa-solid fa-sun"></i>
                    </button>
                </div>
            </header>

            <!-- Dynamic Content -->
            <div class="scrollable-content" id="main-content">
                <div class="content-card" id="content-container">
                    <!-- Content injected via JS -->
                </div>
                
                <!-- Footer Navigation -->
                <div class="content-navigation">
                    <button id="prev-btn" class="nav-btn"><i class="fa-solid fa-arrow-left"></i> Previous</button>
                    <button id="next-btn" class="nav-btn">Next <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

        </main>
    </div>

    <!-- Data and Script -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
